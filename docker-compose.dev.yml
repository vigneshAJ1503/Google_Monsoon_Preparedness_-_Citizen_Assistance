# Development overrides — enables hot reload for backend and frontend
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    volumes:
      - ./backend/src:/app/src
      - ./backend/tests:/app/tests
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      APP_ENV: development
      APP_DEBUG: "true"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    ports:
      - "5173:5173"
    command: npm run dev -- --host 0.0.0.0
