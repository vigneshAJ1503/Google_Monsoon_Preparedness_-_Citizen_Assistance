services:
  # PostgreSQL Database (Free tier - 90 days)
  - type: pserv
    name: monsoonprep-db
    plan: free
    region: oregon
    ipAllowList: []
    database:
      name: monsoonprep
      user: monsoonprep

  # Redis Cache (Free tier)
  - type: redis
    name: monsoonprep-redis
    plan: free
    region: oregon
    ipAllowList: []

  # Backend API Service
  - type: web
    name: monsoonprep-backend
    plan: free
    region: oregon
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_PORT
        value: "8000"
      - key: LOG_LEVEL
        value: INFO
      - key: GROQ_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: monsoonprep-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: monsoonprep-redis
          type: redis
          property: connectionString
      - key: CORS_ORIGINS
        value: "https://monsoonprep-frontend.onrender.com"
      - key: WEATHER_CACHE_TTL_SECONDS
        value: "300"
      - key: FORECAST_CACHE_TTL_SECONDS
        value: "1800"
      - key: ALERT_COOLDOWN_MINUTES
        value: "180"
      - key: ALERT_DATA_MAX_AGE_SECONDS
        value: "600"
      - key: RATE_LIMIT_REQUESTS
        value: "100"
      - key: RATE_LIMIT_WINDOW_SECONDS
        value: "60"
    healthCheckPath: /api/health
    autoDeploy: true

  # Frontend Static Site (Free)
  - type: web
    name: monsoonprep-frontend
    plan: free
    region: oregon
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    envVars:
      - key: VITE_API_URL
        value: "https://monsoonprep-backend.onrender.com"
    autoDeploy: true